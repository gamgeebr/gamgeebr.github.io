<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meu Site</title>

<style>
body {
    margin: 0;
    background-color: black;
    font-family: Arial, sans-serif;
}

/* FAIXA SUPERIOR */
.top-banner {
    height: 140px;
    background: linear-gradient(to right, #0a2caf, white);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-left: 40px;
    padding-right: 0;
}

/* TEXTO */
.banner-text {
    color: black;
    font-size: 28px;
    font-weight: bold;
}

/* IMAGEM */
.banner-img {
    height: 100%;
    aspect-ratio: 1 / 1;
    object-fit: cover;
    display: block;
}
</style>
</head>

<body>

<div class="top-banner">
    <div class="banner-text">PATROCÍNIOS ABERTOS</div>
    <img src="packimg.jpg" class="banner-img">
</div>

</body>
</html>
