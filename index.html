<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meu Site</title>

<style>
body {
    margin: 0;
    background-color: black;
    font-family: Playfair Display;
}

/* FAIXA SUPERIOR */
.top-banner {
    height: 140px;
    background: #0035bb;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    position: relative;
}

/* TEXTO */
.banner-text {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    color: white;
    font-size: 36px;
    font-weight: bold;
}

/* IMAGEM */
.banner-img {
    height: 100%;
    aspect-ratio: 1 / 1;
    object-fit: cover;
}

/* ===== ADIÇÃO ===== */

.cronograma-box {
    width: 300px;
    margin: 40px auto;
    background: white;
    text-align: center;
    padding: 15px 0;
}

.cronograma-box h2 {
    margin: 0;
    color: black;
    font-size: 28px;
}
</style>
</head>

<body>

<div class="top-banner">
    <div class="banner-text">PATROCÍNIOS ABERTOS</div>
    <img src="packimg" class="banner-img">
</div>

<!-- ===== ADIÇÃO ===== -->

<div class="cronograma-box">
    <h2>CRONOGRAMA</h2>
</div>

</body>
</html>
