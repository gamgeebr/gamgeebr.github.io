<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meu Site</title>

<style>
body {
    margin: 0;
    background-color: black;
    font-family: Arial, sans-serif;
}

/* FAIXA SUPERIOR */
.top-banner {
    height: 140px;
    background: linear-gradient(to right, #0a2caf, white);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 50px;
}

/* TEXTO */
.banner-text {
    color: black;
    font-size: 30px;
    font-weight: bold;
    letter-spacing: 2px;
}

/* IMAGEM PREMIUM */
.banner-img {
    height: 100%;
    aspect-ratio: 1 / 1;
    object-fit: cover;
    border-radius: 15px;
    box-shadow: 0 0 25px #0a2caf;
    transition: 0.3s ease;
}

/* Efeito ao passar o mouse */
.banner-img:hover {
    transform: scale(1.05);
    box-shadow: 0 0 40px #0a2caf;
}
</style>
</head>

<body>

<div class="top-banner">
    <div class="banner-text">PATROCÍNIOS ABERTOS</div>
    <img src="packimg.jpg" class="banner-img">
</div>

</body>
</html>
